spring.application.name=audit-demo
server.port=8080

# ---- H2 (file-based so entries survive restarts; switch to mem:auditdb for volatile) ----
spring.datasource.url=jdbc:h2:file:./data/auditdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA ----
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- H2 web console at http://localhost:8080/h2-console ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Logging ----
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
logging.level.AUDIT=INFO
